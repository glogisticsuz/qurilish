server {
    listen 80;
    server_name hamkorqurilish.uz www.hamkorqurilish.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name hamkorqurilish.uz www.hamkorqurilish.uz;

    ssl_certificate /etc/letsencrypt/live/hamkorqurilish.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hamkorqurilish.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Frontend Static Files
    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Unified API Proxy (Strips /api/ prefix)
    location /api/ {
        proxy_pass http://localhost:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Qo'shimcha API yo'llari (Mobile App uchun)
    location /auth/ {
        proxy_pass http://localhost:8001/auth/;
        proxy_set_header Host $host;
    }

    location /profiles/ {
        proxy_pass http://localhost:8001/profiles/;
        proxy_set_header Host $host;
    }

    location /messages/ {
        proxy_pass http://localhost:8001/messages/;
        proxy_set_header Host $host;
    }
}
